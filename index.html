<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlockJump</title>
    <link rel="stylesheet" href="style.css">

</head>

<body>
    <!-- Audio -->
    <audio id="musica" src="sounds/sound-1-bard.mp3" loop></audio>

    <!-- Menu e Background -->
    <div class="menu">
        <img src="assets/titulo.png" alt="Logo do jogo" class="logo">
        <div class="options">
            <button class="btn-imagem-iniciar">Iniciar</button>
            <button class="btn-imagem-carregar">Carregar</button>
            <button class="btn-imagem-opcoes">Opções</button>
            <button class="btn-imagem-informacoes">Informações</button>
        </div>
    </div>




    <!-- Popup de Opções -->
    <div class="overlay" id="overlay"></div>
    <div class="popup" id="popup-opcoes">
        <h2>Opções</h2>

        <div class="popup-item">
            <label>Volume</label>
            <input type="range" id="volume" min="0" max="1" step="0.01" value="1">
        </div>

        <div class="popup-item">
            <label>Som</label>
            <button id="btn-mute">🔊 Mutado: Não</button>
        </div>

        <button class="btn-fechar" id="btn-fechar">Fechar</button>
    </div>

    <script src="scripts/sound.js"></script>

</body>

</html>
